services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    env_file:
      - .env
    volumes:
      - ./app:/app
      - ./app/media:/app/media
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
      local_proxy:
        aliases:
          - crm-web

  worker:
    build: .
    command: python manage.py run_import_worker --poll-interval 2
    env_file:
      - .env
    volumes:
      - ./app:/app
      - ./app/media:/app/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:

  adminer:
    build:
      context: .
      dockerfile: docker/adminer/Dockerfile
    environment:
      ADMINER_AUTOLOGIN: "true"
      ADMINER_DEFAULT_SERVER: ${POSTGRES_HOST:-db}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${ADMINER_PORT:-18080}:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
      local_proxy:
        aliases:
          - crm-adminer

networks:
  local_proxy:
    external: true
    name: local_proxy

volumes:
  postgres_data:
    name: crm_mvp_postgres_data
