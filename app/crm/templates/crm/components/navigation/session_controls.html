<div class="flex flex-wrap items-center gap-3">
    <span class="inline-flex min-h-[42px] items-center rounded-full border border-white/10 bg-white/[0.04] px-4 text-sm font-semibold text-brand-text-inverse">
        {{ request.user.username }}
    </span>
    <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button
            class="tw-button-primary"
            type="submit"
        >
            Log out
        </button>
    </form>
</div>
