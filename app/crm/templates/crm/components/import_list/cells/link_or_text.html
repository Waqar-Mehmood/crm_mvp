<td class="align-top px-5 py-[14px]">
    {% if cell.href %}
        {% include "crm/components/list_workspace/link.html" with href=cell.href label=cell.label external=cell.external only %}
    {% else %}
        <span class="text-sm leading-7 text-brand-text-soft">{{ cell.label|default:"-" }}</span>
    {% endif %}
</td>
