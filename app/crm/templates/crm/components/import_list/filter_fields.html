<div class="tw-import-filter-grid">
    <div class="tw-import-filter-field md:col-span-2">
        <label class="tw-import-filter-label" for="import-q">Search</label>
        <div class="tw-import-filter-shell">
            <input id="import-q" class="tw-import-input tw-import-filter-input" type="text" name="q" value="{{ panel.filters.q }}" placeholder="Search file names">
        </div>
    </div>
    <div class="tw-import-filter-field">
        <label class="tw-import-filter-label" for="import-status">Status</label>
        <div class="tw-import-filter-shell tw-choice-shell">
            <select
                id="import-status"
                class="tw-select"
                name="status"
                data-import-status-select
                data-choice-select="true"
                data-choice-search-enabled="false"
                data-choice-should-sort="false"
                data-choice-placeholder="All statuses"
            >
                <option value="">All statuses</option>
                {% for value, label in panel.status_options %}
                    <option value="{{ value }}" {% if panel.filters.status == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    <div class="tw-import-filter-field">
        <label class="tw-import-filter-label" for="import-updated-from">Updated from</label>
        <div class="tw-import-filter-shell tw-import-filter-date-shell">
            <input id="import-updated-from" class="tw-import-input tw-import-filter-input tw-import-filter-date-input" type="date" name="updated_from" value="{{ panel.filters.updated_from }}" data-import-date-field placeholder="mm/dd/yyyy">
            <span class="tw-import-filter-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                    <path fill="currentColor" d="M7 2a1 1 0 0 1 1 1v1h8V3a1 1 0 1 1 2 0v1h1a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3H5a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3h1V3a1 1 0 0 1 1-1Zm12 8H5v7a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-7ZM6 6a1 1 0 0 0-1 1v1h14V7a1 1 0 0 0-1-1H6Z"></path>
                </svg>
            </span>
        </div>
    </div>
    <div class="tw-import-filter-field">
        <label class="tw-import-filter-label" for="import-updated-to">Updated to</label>
        <div class="tw-import-filter-shell tw-import-filter-date-shell">
            <input id="import-updated-to" class="tw-import-input tw-import-filter-input tw-import-filter-date-input" type="date" name="updated_to" value="{{ panel.filters.updated_to }}" data-import-date-field placeholder="mm/dd/yyyy">
            <span class="tw-import-filter-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                    <path fill="currentColor" d="M7 2a1 1 0 0 1 1 1v1h8V3a1 1 0 1 1 2 0v1h1a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3H5a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3h1V3a1 1 0 0 1 1-1Zm12 8H5v7a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-7ZM6 6a1 1 0 0 0-1 1v1h14V7a1 1 0 0 0-1-1H6Z"></path>
                </svg>
            </span>
        </div>
    </div>
</div>
