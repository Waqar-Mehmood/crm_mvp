{% if panel.items %}
    <div class="flex flex-col gap-4">
        {% for item in panel.items %}
            {% include "crm/components/dashboard/detail_card.html" with item=item only %}
        {% endfor %}
    </div>
{% elif panel.empty_text %}
    <p class="m-0 text-sm leading-7 text-slate-500">{{ panel.empty_text }}</p>
{% endif %}
