<div class="flex flex-col gap-3">
    {% for action in actions %}
        <a
            class="inline-flex min-h-[48px] items-center justify-center rounded-full border px-5 text-sm font-semibold no-underline transition duration-200 hover:-translate-y-px {% if tone == 'hero' %}{% if action.variant == 'primary' %}border-paper-100/50 bg-gradient-to-br from-paper-100 to-[#f1dcc3] text-ink-900 hover:border-paper-100/70 hover:text-ink-900{% else %}border-white/10 bg-white/[0.06] text-paper-100 hover:border-white/20 hover:bg-white/[0.1] hover:text-paper-100{% endif %}{% else %}{% if action.variant == 'primary' %}border-[#d17d2f]/30 bg-gradient-to-r from-[#f5c994] to-[#ee8e42] text-ink-900 hover:border-[#d17d2f]/50 hover:text-ink-900{% else %}border-[#eadfce] bg-white/80 text-slate-700 hover:border-[#d9c7aa] hover:bg-white hover:text-slate-900{% endif %}{% endif %}"
            href="{{ action.href }}"
        >
            {{ action.label }}
        </a>
    {% endfor %}
</div>
