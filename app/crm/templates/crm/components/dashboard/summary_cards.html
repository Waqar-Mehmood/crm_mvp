<section class="grid gap-6 md:grid-cols-2 xl:grid-cols-4">
    {% for card in cards %}
        <article class="flex min-h-[12.75rem] flex-col gap-4 rounded-[2rem] border border-[#eadfce] bg-[linear-gradient(140deg,rgba(255,255,255,0.98),rgba(247,241,227,0.92))] p-5 shadow-[0_24px_60px_rgba(15,23,42,0.12)] sm:p-6">
            <p class="m-0 text-[0.72rem] font-semibold uppercase tracking-[0.24em] text-slate-400">{{ card.label }}</p>
            <h2 class="m-0 text-[2rem] font-semibold leading-none text-slate-800">{{ card.value }}</h2>
            <p class="m-0 text-sm leading-7 text-slate-500">{{ card.subtext }}</p>
        </article>
    {% endfor %}
</section>
