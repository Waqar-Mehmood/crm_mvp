<div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
    <div class="min-w-0 flex flex-col gap-2">
        <p class="m-0 text-[0.72rem] font-semibold uppercase tracking-[0.24em] text-slate-400">{{ panel.kicker }}</p>
        <h2 class="m-0 font-serif text-[2rem] leading-none text-slate-800">{{ panel.title }}</h2>
    </div>
    {% if panel.action %}
        <a
            class="inline-flex min-h-[42px] items-center justify-center rounded-full border px-4 text-sm font-semibold no-underline transition duration-200 hover:-translate-y-px {% if panel.action.variant == 'primary' %}border-[#d17d2f]/30 bg-gradient-to-r from-[#f5c994] to-[#ee8e42] text-ink-900 hover:border-[#d17d2f]/50 hover:text-ink-900{% else %}border-[#eadfce] bg-white/85 text-slate-700 hover:border-[#d9c7aa] hover:bg-white hover:text-slate-900{% endif %}"
            href="{{ panel.action.href }}"
        >
            {{ panel.action.label }}
        </a>
    {% endif %}
</div>
