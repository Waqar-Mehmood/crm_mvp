<article class="flex flex-col gap-4 rounded-[1.6rem] border border-[#ede4d6] bg-white/80 p-4 shadow-[inset_0_1px_0_rgba(255,255,255,0.82)]">
    <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
        <div class="min-w-0 flex flex-col gap-1">
            <p class="m-0 text-[0.68rem] font-semibold uppercase tracking-[0.22em] text-slate-400">{{ item.kicker }}</p>
            <h3 class="m-0 break-words text-base font-semibold leading-6 text-slate-900">{{ item.title }}</h3>
        </div>
        {% if item.badge %}
            <span class="inline-flex items-center rounded-full border border-slate-200 bg-slate-50 px-3 py-1.5 text-xs font-semibold text-slate-500">{{ item.badge }}</span>
        {% endif %}
    </div>
    {% if item.meta %}
        <p class="m-0 text-sm leading-6 text-slate-500">{{ item.meta }}</p>
    {% endif %}
    {% if item.body %}
        <p class="m-0 text-sm leading-6 text-slate-600">{{ item.body }}</p>
    {% endif %}
    {% if item.link %}
        <a class="text-sm font-semibold text-[#d17d2f] no-underline transition duration-200 hover:text-[#b76616]" href="{{ item.link.href }}">{{ item.link.label }}</a>
    {% endif %}
</article>
