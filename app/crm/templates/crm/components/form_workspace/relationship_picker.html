<div
    class="flex flex-col gap-3 rounded-[1.45rem] border border-brand-surface-borderSoft bg-white/72 p-4 shadow-brand-surface-inset"
    data-live-relationship-picker
    data-search-url="{{ search_url }}"
    data-field-name="{{ field.name }}"
    data-empty-text="{{ empty_text|default:'Start typing to search.' }}"
    data-no-results-text="{{ no_results_text|default:'No results found.' }}"
    data-selected-empty-text="{{ selected_empty_text|default:'No items selected.' }}"
>
    <input
        class="tw-input"
        type="search"
        placeholder="{{ placeholder }}"
        aria-label="{{ field.label }}"
        data-relationship-search
    >
    <div data-relationship-hidden-inputs>
        {% for item in selected_items %}
            <input type="hidden" name="{{ field.name }}" value="{{ item.id }}">
        {% endfor %}
    </div>
    <div class="flex flex-col gap-3" data-relationship-selected>
        {% if selected_items %}
            <div class="flex flex-wrap gap-2">
                {% for item in selected_items %}
                    <button
                        class="inline-flex items-center gap-2 rounded-full border border-brand-surface-border bg-brand-surface-soft px-4 py-2 text-sm font-semibold text-brand-text-soft transition duration-200 hover:border-brand-accent/30 hover:text-brand-text-base"
                        type="button"
                        data-selected-id="{{ item.id }}"
                        data-selected-label="{{ item.label }}"
                        data-selected-meta="{{ item.meta }}"
                    >
                        <span>{{ item.label }}</span>
                        <strong class="text-[0.72rem] uppercase tracking-[0.14em] text-brand-accent">Remove</strong>
                    </button>
                {% endfor %}
            </div>
        {% else %}
            <p class="m-0 text-sm leading-6 text-brand-text-muted" data-relationship-selected-empty>{{ selected_empty_text|default:'No items selected.' }}</p>
        {% endif %}
    </div>
    <div class="flex flex-col gap-2 rounded-[1.15rem] border border-brand-surface-borderSoft bg-white/72 p-3 shadow-brand-surface-inset-strong" data-relationship-results>
        <p class="m-0 text-sm leading-6 text-brand-text-muted" data-relationship-results-empty>{{ empty_text|default:'Start typing to search.' }}</p>
    </div>
</div>
