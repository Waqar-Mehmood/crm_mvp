<article class="flex min-h-[12.75rem] flex-col gap-4 rounded-crm-lg border border-brand-surface-borderSoft bg-brand-gradient-surface p-5 text-brand-text-base shadow-brand-card sm:p-6">
    <p class="m-0 text-[0.72rem] font-semibold uppercase tracking-[0.24em] text-brand-text-subtle">{{ card.label }}</p>
    <h2 class="m-0 text-[2rem] font-semibold leading-none tracking-[-0.02em] text-brand-text-strong">{{ card.value }}</h2>
    <p class="m-0 text-sm leading-7 text-brand-text-muted">{{ card.subtext }}</p>
</article>
