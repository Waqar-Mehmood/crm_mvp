<article class="flex flex-col gap-4 rounded-crm-md border border-brand-surface-borderSoft bg-white/82 p-4 shadow-brand-surface-inset-strong">
    <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
        <div class="min-w-0 flex flex-col gap-1">
            <p class="m-0 text-[0.68rem] font-semibold uppercase tracking-[0.22em] text-brand-text-subtle">{{ item.kicker }}</p>
            <h3 class="m-0 break-words text-base font-semibold leading-6 text-brand-text-strong">{{ item.title }}</h3>
        </div>
        {% if item.badge %}
            <span class="inline-flex items-center rounded-full border border-brand-surface-borderSoft bg-brand-surface-soft px-3 py-1.5 text-xs font-semibold text-brand-text-subtle">{{ item.badge }}</span>
        {% endif %}
    </div>
    {% if item.meta %}
        <p class="m-0 text-sm leading-6 text-brand-text-muted">{{ item.meta }}</p>
    {% endif %}
    {% if item.body %}
        <p class="m-0 text-sm leading-6 text-brand-text-muted">{{ item.body }}</p>
    {% endif %}
    {% if item.link %}
        <a class="text-sm font-semibold text-brand-accent no-underline transition duration-200 hover:text-brand-accent-strong hover:underline hover:underline-offset-4" href="{{ item.link.href }}">{{ item.link.label }}</a>
    {% endif %}
</article>
