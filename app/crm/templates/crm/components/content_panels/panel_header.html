<div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
    <div class="min-w-0 flex flex-col gap-2">
        <p class="m-0 text-[0.72rem] font-semibold uppercase tracking-[0.24em] text-brand-text-subtle">{{ panel.kicker }}</p>
        <h2 class="m-0 font-serif text-[2rem] leading-none text-brand-text-base">{{ panel.title }}</h2>
    </div>
    {% if panel.action %}
        <a
            class="{% if panel.action.variant == 'primary' %}tw-control-button-accent{% else %}tw-control-button{% endif %} min-h-[42px]"
            href="{{ panel.action.href }}"
        >
            {{ panel.action.label }}
        </a>
    {% endif %}
</div>
