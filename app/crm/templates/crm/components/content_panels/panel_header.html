<div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
    <div class="min-w-0 flex flex-col gap-2">
        <p class="m-0 text-[0.72rem] font-semibold uppercase tracking-[0.24em] text-brand-text-subtle">{{ panel.kicker }}</p>
        <h2 class="m-0 font-serif text-[2rem] leading-none text-brand-text-base">{{ panel.title }}</h2>
    </div>
    {% if panel.action %}
        <a
            class="inline-flex min-h-[42px] items-center justify-center rounded-full border px-4 text-sm font-semibold no-underline transition duration-200 hover:-translate-y-px {% if panel.action.variant == 'primary' %}border-brand-accent/30 bg-brand-gradient-accent text-brand-text-strong shadow-brand-button hover:border-brand-accent/50 hover:text-brand-text-strong{% else %}border-brand-surface-borderSoft bg-white/88 text-brand-text-soft shadow-sm hover:border-brand-surface-border hover:bg-white hover:text-brand-text-base{% endif %}"
            href="{{ panel.action.href }}"
        >
            {{ panel.action.label }}
        </a>
    {% endif %}
</div>
