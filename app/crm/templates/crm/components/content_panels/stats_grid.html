<dl class="grid gap-4 sm:grid-cols-2">
    {% for stat in stats %}
        <div class="flex flex-col gap-2 rounded-crm-md border border-brand-surface-borderSoft bg-white/72 p-4 shadow-brand-surface-inset">
            <dt class="text-[0.7rem] font-semibold uppercase tracking-[0.22em] text-brand-text-subtle">{{ stat.label }}</dt>
            <dd class="m-0 text-[1.9rem] font-semibold leading-none text-brand-text-base">{{ stat.value }}</dd>
        </div>
    {% endfor %}
</dl>
