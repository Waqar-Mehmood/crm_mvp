<td class="align-top px-5 py-[14px]">
    {% if primary or secondary %}
        <div class="flex flex-col gap-1">
            {% if primary %}
                <div class="text-sm font-medium leading-6 text-brand-text-base">{{ primary }}</div>
            {% endif %}
            {% if secondary %}
                <div class="text-sm leading-6 text-brand-text-subtle">{{ secondary }}</div>
            {% endif %}
        </div>
    {% endif %}
</td>
