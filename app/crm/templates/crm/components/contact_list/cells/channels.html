<td class="align-top px-5 py-[14px]">
    {% if channels %}
        <ul class="m-0 flex list-none flex-col gap-2 p-0">
            {% for channel in channels %}
                <li class="flex flex-wrap items-center gap-3">
                    <span class="inline-flex items-center rounded-full border px-2.5 py-1 text-[0.7rem] font-semibold uppercase tracking-[0.18em] {% if channel.tone == 'work' %}border-brand-chip-workBorder bg-brand-chip-workBg text-brand-chip-workText{% elif channel.tone == 'personal' %}border-brand-chip-personalBorder bg-brand-chip-personalBg text-brand-chip-personalText{% else %}border-brand-chip-neutralBorder bg-brand-chip-neutralBg text-brand-chip-neutralText{% endif %}">
                        {% if channel.tone == 'work' %}
                            <svg class="mr-1 h-[0.9rem] w-[0.9rem]" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                <path d="M9 6V4.75A1.75 1.75 0 0 1 10.75 3h2.5A1.75 1.75 0 0 1 15 4.75V6h2.75A2.25 2.25 0 0 1 20 8.25v8.5A2.25 2.25 0 0 1 17.75 19h-11.5A2.25 2.25 0 0 1 4 16.75v-8.5A2.25 2.25 0 0 1 6.25 6H9Zm1.5 0h3V4.75a.25.25 0 0 0-.25-.25h-2.5a.25.25 0 0 0-.25.25V6Z" fill="currentColor"></path>
                            </svg>
                        {% elif channel.tone == 'personal' %}
                            <svg class="mr-1 h-[0.9rem] w-[0.9rem]" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                <path d="M12 12a3.5 3.5 0 1 0-3.5-3.5A3.5 3.5 0 0 0 12 12Zm0 1.5c-3.18 0-5.75 1.93-5.75 4.31 0 .39.31.69.69.69h10.12a.69.69 0 0 0 .69-.69c0-2.38-2.57-4.31-5.75-4.31Z" fill="currentColor"></path>
                            </svg>
                        {% endif %}
                        {{ channel.label }}
                    </span>
                    <span class="text-sm leading-6 text-brand-text-base">{{ channel.value }}</span>
                </li>
            {% endfor %}
        </ul>
    {% endif %}
</td>
