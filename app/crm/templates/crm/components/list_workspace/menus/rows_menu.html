<details class="tw-dropdown-menu group/rows" data-dropdown-menu>
    <summary class="tw-control-button">
        <span>{{ menu.label }}</span>
        <svg class="h-3 w-3 transition duration-200 group-open/rows:rotate-180" viewBox="0 0 12 12" aria-hidden="true" focusable="false">
            <path d="M2.5 4.5 6 8l3.5-3.5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
        </svg>
    </summary>
    <div class="tw-dropdown-panel min-w-[9rem]">
        {% for option in menu.options %}
            <a class="tw-dropdown-link flex items-center justify-between {% if option.is_active %}tw-dropdown-link-active{% endif %}" href="{{ option.url }}">
                <span>{{ option.label }}</span>
                {% if option.is_active %}
                    <span class="text-[0.88rem] font-bold">✓</span>
                {% endif %}
            </a>
        {% endfor %}
    </div>
</details>
