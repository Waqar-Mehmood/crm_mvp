<div class="flex flex-col gap-4">
    {% for action in actions %}
        <a
            class="inline-flex w-full items-center justify-center border px-6 text-[1rem] font-semibold tracking-[-0.01em] no-underline transition duration-200 hover:-translate-y-px {% if tone == 'hero' %}min-h-[48px] rounded-full {% if action.variant == 'primary' %}border-brand-surface-base/55 bg-brand-gradient-accent text-brand-text-strong shadow-brand-button-strong hover:border-brand-surface-base/72 hover:text-brand-text-strong{% else %}border-white/7 bg-brand-shell-900/94 text-brand-text-inverse shadow-brand-dark-inset hover:border-white/14 hover:bg-brand-shell-800 hover:text-brand-text-inverse{% endif %}{% else %}min-h-[48px] rounded-full {% if action.variant == 'primary' %}border-brand-accent/30 bg-brand-gradient-accent text-brand-text-strong shadow-brand-button hover:border-brand-accent/50 hover:text-brand-text-strong{% else %}border-brand-surface-borderSoft bg-white/88 text-brand-text-soft shadow-sm hover:border-brand-surface-border hover:bg-white hover:text-brand-text-base{% endif %}{% endif %}"
            href="{{ action.href }}"
        >
            {{ action.label }}
        </a>
    {% endfor %}
</div>
