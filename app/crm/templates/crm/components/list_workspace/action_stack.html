<div class="flex flex-col gap-4">
    {% for action in actions %}
        <a
            class="w-full px-6 text-[1rem] tracking-[-0.01em] {% if action.variant == 'primary' %}{% if tone == 'hero' %}tw-button-hero-primary{% else %}tw-button-primary{% endif %}{% elif action.variant == 'danger' %}tw-button-danger{% elif tone == 'hero' %}tw-button-hero-secondary{% else %}tw-button-surface{% endif %}"
            href="{{ action.href }}"
        >
            {{ action.label }}
        </a>
    {% endfor %}
</div>
