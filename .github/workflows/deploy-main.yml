name: Deploy Main

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger server deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            APP_DIR="/home/ec2-user/crm_mvp_release"
            BRANCH="main"

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"

            docker compose -f docker-compose.prod.yml build web worker
            docker rm -f crm_mvp_release-db-1 >/dev/null 2>&1 || true
            docker rm -f crm_web >/dev/null 2>&1 || true
            docker compose -f docker-compose.prod.yml up -d --remove-orphans web worker adminer
            docker compose -f docker-compose.prod.yml exec -T web python manage.py migrate
            docker compose -f docker-compose.prod.yml ps
